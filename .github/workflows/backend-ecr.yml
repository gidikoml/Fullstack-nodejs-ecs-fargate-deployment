name: Backend ECR Pipeline

on:
  workflow_dispatch:
  workflow_call:

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      ECR_REPOSITORY: backend
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Show backend workflow context
        run: |
          echo "Backend workflow started"
          echo "Trigger: ${{ github.event_name }}"
          echo "Branch or ref: ${{ github.ref }}"
          echo "ECR repository: ${{ env.ECR_REPOSITORY }}"
          echo "Image tag: ${{ env.IMAGE_TAG }}"
          echo "Push to ECR on this run: ${{ github.event_name != 'pull_request' }}"
          {
            echo "## Backend Pipeline"
            echo ""
            echo "- Trigger: \`${{ github.event_name }}\`"
            echo "- Ref: \`${{ github.ref }}\`"
            echo "- ECR repository: \`${{ env.ECR_REPOSITORY }}\`"
            echo "- Image tag: \`${{ env.IMAGE_TAG }}\`"
            echo "- Will push image: \`${{ github.event_name != 'pull_request' }}\`"
            echo "- Flow: install -> smoke test -> docker build -> ECR push"
          } >> $GITHUB_STEP_SUMMARY

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        id: setup_node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        id: install_dependencies
        shell: bash
        working-directory: backend
        run: |
          set -o pipefail
          npm ci 2>&1 | tee ../backend-install.log

      - name: Run backend smoke test
        id: run_smoke_test
        shell: bash
        working-directory: backend
        run: |
          set -o pipefail
          npm test 2>&1 | tee ../backend-test.log

      - name: Build backend Docker image
        id: docker_build
        shell: bash
        run: |
          set -o pipefail
          docker build -t ${{ env.ECR_REPOSITORY }}:ci -f backend/Dockerfile backend 2>&1 | tee backend-docker-build.log

      - name: Configure AWS credentials
        if: github.event_name != 'pull_request'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: github.event_name != 'pull_request'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag backend image for ECR
        id: tag_image
        if: github.event_name != 'pull_request'
        run: |
          docker tag ${{ env.ECR_REPOSITORY }}:ci ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          docker tag ${{ env.ECR_REPOSITORY }}:ci ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

      - name: Push backend image to ECR
        id: push_image
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set -o pipefail
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} 2>&1 | tee backend-push.log
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest 2>&1 | tee -a backend-push.log

      - name: Publish backend failure reason
        if: failure()
        shell: bash
        run: |
          {
            echo ""
            echo "## Backend Failure Details"
          } >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.install_dependencies.outcome }}" = "failure" ]; then
            echo "- Failed step: \`Install backend dependencies\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```text' >> $GITHUB_STEP_SUMMARY
            tail -n 40 backend-install.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.run_smoke_test.outcome }}" = "failure" ]; then
            echo "- Failed step: \`Run backend smoke test\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```text' >> $GITHUB_STEP_SUMMARY
            tail -n 40 backend-test.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.docker_build.outcome }}" = "failure" ]; then
            echo "- Failed step: \`Build backend Docker image\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```text' >> $GITHUB_STEP_SUMMARY
            tail -n 40 backend-docker-build.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.push_image.outcome }}" = "failure" ]; then
            echo "- Failed step: \`Push backend image to ECR\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```text' >> $GITHUB_STEP_SUMMARY
            tail -n 40 backend-push.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "- A backend step failed before a log file could be captured. Open the job logs for the first failed step." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload backend logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-pipeline-logs
          if-no-files-found: ignore
          path: |
            backend-install.log
            backend-test.log
            backend-docker-build.log
            backend-push.log

      - name: Publish backend completion summary
        if: always()
        run: |
          {
            echo ""
            echo "### Backend Pipeline Status"
            echo "- Job status: \`${{ job.status }}\`"
            echo "- Trigger: \`${{ github.event_name }}\`"
            echo "- Repository target: \`${{ env.ECR_REPOSITORY }}\`"
          } >> $GITHUB_STEP_SUMMARY
