name: Terraform RDS Deploy

on:
  workflow_dispatch:
    inputs:
      terraform_action:
        description: "Choose whether to preview, deploy, or destroy the RDS Terraform"
        required: true
        type: choice
        default: apply
        options:
          - apply
          - plan
          - destroy
      destroy_confirmation:
        description: "Type DESTROY to allow terraform destroy"
        required: false
        type: string

permissions:
  contents: read

jobs:
  rds-terraform:
    runs-on: ubuntu-latest
    env:
      TF_WORKING_DIR: terraform-ecs-fargate-fullstack-app/rds
      AWS_REGION_VAR: ${{ vars.AWS_REGION }}
      AWS_REGION_SECRET: ${{ secrets.AWS_REGION }}
      TF_STATE_BUCKET_VAR: ${{ vars.TF_STATE_BUCKET }}
      TF_STATE_BUCKET_SECRET: ${{ secrets.TF_STATE_BUCKET }}
      TF_LOCK_TABLE_VAR: ${{ vars.TF_LOCK_TABLE }}
      TF_LOCK_TABLE_SECRET: ${{ secrets.TF_LOCK_TABLE }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.7
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION_VAR != '' && env.AWS_REGION_VAR || env.AWS_REGION_SECRET != '' && env.AWS_REGION_SECRET || 'us-east-1' }}

      - name: Show Terraform workflow context
        run: |
          {
            echo "## Manual Terraform RDS Deploy"
            echo ""
            echo "- Trigger: \`${{ github.event_name }}\`"
            echo "- Ref: \`${{ github.ref }}\`"
            echo "- AWS region source detected: \`${{ vars.AWS_REGION != '' || secrets.AWS_REGION != '' }}\`"
            echo "- Working directory: \`${{ env.TF_WORKING_DIR }}\`"
            echo "- Requested action: \`${{ inputs.terraform_action }}\`"
            echo "- Destroy confirmation provided: \`${{ inputs.destroy_confirmation != '' }}\`"
            echo "- Remote state key: \`rds/terraform.tfstate\`"
            echo "- TF_STATE_BUCKET detected: \`${{ vars.TF_STATE_BUCKET != '' || secrets.TF_STATE_BUCKET != '' }}\`"
            echo "- TF_LOCK_TABLE detected: \`${{ vars.TF_LOCK_TABLE != '' || secrets.TF_LOCK_TABLE != '' }}\`"
            echo ""
            echo "This workflow is manual-only. It never runs automatically on push or pull request."
          } >> $GITHUB_STEP_SUMMARY

      - name: Terraform format check
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform fmt -check -no-color

      - name: Terraform init
        shell: bash
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          TF_STATE_BUCKET="${TF_STATE_BUCKET_VAR:-$TF_STATE_BUCKET_SECRET}"
          TF_LOCK_TABLE="${TF_LOCK_TABLE_VAR:-$TF_LOCK_TABLE_SECRET}"
          AWS_REGION="${AWS_REGION_VAR:-$AWS_REGION_SECRET}"

          if [ -z "$AWS_REGION" ]; then
            AWS_REGION="us-east-1"
          fi

          if [ -z "$TF_STATE_BUCKET" ]; then
            echo "Missing TF_STATE_BUCKET. Add it in GitHub Actions Variables or Secrets."
            exit 1
          fi

          if [ -z "$TF_LOCK_TABLE" ]; then
            echo "Missing TF_LOCK_TABLE. Add it in GitHub Actions Variables or Secrets."
            exit 1
          fi

          BACKEND_ARGS=(
            -backend-config="bucket=$TF_STATE_BUCKET"
            -backend-config="key=rds/terraform.tfstate"
            -backend-config="region=$AWS_REGION"
            -backend-config="encrypt=true"
            -backend-config="dynamodb_table=$TF_LOCK_TABLE"
          )

          terraform init -input=false -no-color "${BACKEND_ARGS[@]}"

      - name: Terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate -no-color

      - name: Terraform plan
        if: inputs.terraform_action == 'plan' || inputs.terraform_action == 'apply'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -input=false -no-color

      - name: Terraform destroy plan
        if: inputs.terraform_action == 'destroy'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -destroy -input=false -no-color

      - name: Confirm destroy request
        if: inputs.terraform_action == 'destroy'
        shell: bash
        run: |
          if [ "${{ inputs.destroy_confirmation }}" != "DESTROY" ]; then
            echo "Destroy confirmation missing. Type DESTROY in the workflow input to continue."
            exit 1
          fi

      - name: Terraform apply
        if: inputs.terraform_action == 'apply'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve -input=false -no-color

      - name: Terraform destroy
        if: inputs.terraform_action == 'destroy' && inputs.destroy_confirmation == 'DESTROY'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform destroy -auto-approve -input=false -no-color

      - name: Show managed AWS resources
        if: always()
        shell: bash
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          {
            echo ""
            echo "## Managed AWS Resources"
          } >> $GITHUB_STEP_SUMMARY

          if terraform state list > terraform-state-resources.txt 2>/dev/null; then
            if [ -s terraform-state-resources.txt ]; then
              echo "Resources currently managed by this Terraform folder:" >> $GITHUB_STEP_SUMMARY
              echo '```text' >> $GITHUB_STEP_SUMMARY
              cat terraform-state-resources.txt >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
            else
              echo "No resources are currently managed in this Terraform state." >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "Terraform state is not available yet, so no managed resource list could be shown." >> $GITHUB_STEP_SUMMARY
          fi

          if terraform output -no-color > terraform-outputs.txt 2>/dev/null; then
            if [ -s terraform-outputs.txt ]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "### Terraform Outputs" >> $GITHUB_STEP_SUMMARY
              echo '```text' >> $GITHUB_STEP_SUMMARY
              cat terraform-outputs.txt >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
            fi
          fi

      - name: Publish Terraform result summary
        if: always()
        run: |
          {
            echo ""
            echo "### Terraform RDS Workflow Status"
            echo "- Job status: \`${{ job.status }}\`"
            echo "- Requested action: \`${{ inputs.terraform_action }}\`"
            echo "- Destroy confirmation matched: \`${{ inputs.destroy_confirmation == 'DESTROY' }}\`"
            echo "- Manual only: \`true\`"
          } >> $GITHUB_STEP_SUMMARY
