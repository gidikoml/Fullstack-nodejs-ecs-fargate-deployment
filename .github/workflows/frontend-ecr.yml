name: Frontend ECR Pipeline

on:
  push:
    branches:
      - main
      - master
    paths:
      - "client/**"
      - ".github/workflows/frontend-ecr.yml"
  pull_request:
    branches:
      - main
      - master
    paths:
      - "client/**"
      - ".github/workflows/frontend-ecr.yml"
  workflow_dispatch:
  workflow_call:

jobs:
  frontend:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      ECR_REPOSITORY: frontend
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Show frontend workflow context
        run: |
          echo "Frontend workflow started"
          echo "Trigger: ${{ github.event_name }}"
          echo "Branch or ref: ${{ github.ref }}"
          echo "ECR repository: ${{ env.ECR_REPOSITORY }}"
          echo "Image tag: ${{ env.IMAGE_TAG }}"
          echo "Push to ECR on this run: ${{ github.event_name != 'pull_request' }}"
          {
            echo "## Frontend Pipeline"
            echo ""
            echo "- Trigger: \`${{ github.event_name }}\`"
            echo "- Ref: \`${{ github.ref }}\`"
            echo "- ECR repository: \`${{ env.ECR_REPOSITORY }}\`"
            echo "- Image tag: \`${{ env.IMAGE_TAG }}\`"
            echo "- Will push image: \`${{ github.event_name != 'pull_request' }}\`"
            echo "- Flow: install -> test -> build -> docker build -> ECR push"
          } >> $GITHUB_STEP_SUMMARY

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install frontend dependencies
        working-directory: client
        run: npm ci

      - name: Run frontend tests
        working-directory: client
        run: npm test -- --watchAll=false

      - name: Build frontend app
        working-directory: client
        run: npm run build

      - name: Build frontend Docker image
        run: docker build -t ${{ env.ECR_REPOSITORY }}:ci -f client/Dockerfile client

      - name: Configure AWS credentials
        if: github.event_name != 'pull_request'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: github.event_name != 'pull_request'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag frontend image for ECR
        if: github.event_name != 'pull_request'
        run: |
          docker tag ${{ env.ECR_REPOSITORY }}:ci ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          docker tag ${{ env.ECR_REPOSITORY }}:ci ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

      - name: Push frontend image to ECR
        if: github.event_name != 'pull_request'
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

      - name: Publish frontend completion summary
        if: always()
        run: |
          {
            echo ""
            echo "### Frontend Pipeline Status"
            echo "- Job status: \`${{ job.status }}\`"
            echo "- Trigger: \`${{ github.event_name }}\`"
            echo "- Repository target: \`${{ env.ECR_REPOSITORY }}\`"
          } >> $GITHUB_STEP_SUMMARY
