name: Frontend ECR Pipeline

on:
  workflow_dispatch:
  workflow_call:

jobs:
  frontend:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      ECR_REPOSITORY: frontend
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Show frontend workflow context
        run: |
          echo "Frontend workflow started"
          echo "Trigger: ${{ github.event_name }}"
          echo "Branch or ref: ${{ github.ref }}"
          echo "ECR repository: ${{ env.ECR_REPOSITORY }}"
          echo "Image tag: ${{ env.IMAGE_TAG }}"
          echo "Push to ECR on this run: ${{ github.event_name != 'pull_request' }}"
          {
            echo "## Frontend Pipeline"
            echo ""
            echo "- Trigger: \`${{ github.event_name }}\`"
            echo "- Ref: \`${{ github.ref }}\`"
            echo "- ECR repository: \`${{ env.ECR_REPOSITORY }}\`"
            echo "- Image tag: \`${{ env.IMAGE_TAG }}\`"
            echo "- Will push image: \`${{ github.event_name != 'pull_request' }}\`"
            echo "- Flow: install -> test -> build -> docker build -> ECR push"
          } >> $GITHUB_STEP_SUMMARY

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        id: setup_node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install frontend dependencies
        id: install_dependencies
        shell: bash
        working-directory: client
        run: |
          set -o pipefail
          npm ci 2>&1 | tee ../frontend-install.log

      - name: Run frontend tests
        id: run_tests
        shell: bash
        working-directory: client
        run: |
          set -o pipefail
          npm test -- --watchAll=false 2>&1 | tee ../frontend-test.log

      - name: Build frontend app
        id: build_app
        shell: bash
        working-directory: client
        run: |
          set -o pipefail
          npm run build 2>&1 | tee ../frontend-build.log

      - name: Build frontend Docker image
        id: docker_build
        shell: bash
        run: |
          set -o pipefail
          docker build -t ${{ env.ECR_REPOSITORY }}:ci -f client/Dockerfile client 2>&1 | tee frontend-docker-build.log

      - name: Configure AWS credentials
        if: github.event_name != 'pull_request'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        if: github.event_name != 'pull_request'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag frontend image for ECR
        id: tag_image
        if: github.event_name != 'pull_request'
        run: |
          docker tag ${{ env.ECR_REPOSITORY }}:ci ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          docker tag ${{ env.ECR_REPOSITORY }}:ci ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

      - name: Push frontend image to ECR
        id: push_image
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set -o pipefail
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} 2>&1 | tee frontend-push.log
          docker push ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest 2>&1 | tee -a frontend-push.log

      - name: Publish frontend failure reason
        if: failure()
        shell: bash
        run: |
          {
            echo ""
            echo "## Frontend Failure Details"
          } >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.install_dependencies.outcome }}" = "failure" ]; then
            echo "- Failed step: \`Install frontend dependencies\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```text' >> $GITHUB_STEP_SUMMARY
            tail -n 40 frontend-install.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.run_tests.outcome }}" = "failure" ]; then
            echo "- Failed step: \`Run frontend tests\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```text' >> $GITHUB_STEP_SUMMARY
            tail -n 40 frontend-test.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.build_app.outcome }}" = "failure" ]; then
            echo "- Failed step: \`Build frontend app\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```text' >> $GITHUB_STEP_SUMMARY
            tail -n 40 frontend-build.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.docker_build.outcome }}" = "failure" ]; then
            echo "- Failed step: \`Build frontend Docker image\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```text' >> $GITHUB_STEP_SUMMARY
            tail -n 40 frontend-docker-build.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.push_image.outcome }}" = "failure" ]; then
            echo "- Failed step: \`Push frontend image to ECR\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```text' >> $GITHUB_STEP_SUMMARY
            tail -n 40 frontend-push.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "- A frontend step failed before a log file could be captured. Open the job logs for the first failed step." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload frontend logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-pipeline-logs
          if-no-files-found: ignore
          path: |
            frontend-install.log
            frontend-test.log
            frontend-build.log
            frontend-docker-build.log
            frontend-push.log

      - name: Publish frontend completion summary
        if: always()
        run: |
          {
            echo ""
            echo "### Frontend Pipeline Status"
            echo "- Job status: \`${{ job.status }}\`"
            echo "- Trigger: \`${{ github.event_name }}\`"
            echo "- Repository target: \`${{ env.ECR_REPOSITORY }}\`"
          } >> $GITHUB_STEP_SUMMARY
