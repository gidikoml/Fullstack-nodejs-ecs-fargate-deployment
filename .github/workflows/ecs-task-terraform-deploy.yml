name: Terraform ECS Task Deploy

on:
  workflow_dispatch:
    inputs:
      terraform_action:
        description: "Choose action: apply, plan, or destroy"
        required: true
        type: choice
        default: apply
        options:
          - apply
          - plan
          - destroy
      destroy_confirmation:
        description: "Type DESTROY to confirm destroy"
        required: false
        type: string

permissions:
  contents: read

jobs:
  ecs-task-terraform:
    runs-on: ubuntu-latest

    env:
      TF_WORKING_DIR: terraform-ecs-fargate-fullstack-app/ecs-task

      # ✅ HARD FIX (plus de bug)
      AWS_REGION: us-east-1

      TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
      TF_LOCK_TABLE: ${{ secrets.TF_LOCK_TABLE }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Debug
        run: |
          echo "AWS REGION = $AWS_REGION"
          echo "TF DIR = $TF_WORKING_DIR"

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=$TF_STATE_BUCKET" \
            -backend-config="key=ecs-task/terraform.tfstate" \
            -backend-config="region=$AWS_REGION" \
            -backend-config="encrypt=true" \
            -backend-config="dynamodb_table=$TF_LOCK_TABLE"

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        if: inputs.terraform_action == 'plan' || inputs.terraform_action == 'apply'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan

      - name: Confirm Destroy
        if: inputs.terraform_action == 'destroy'
        run: |
          if [ "${{ inputs.destroy_confirmation }}" != "DESTROY" ]; then
            echo "Destroy not confirmed"
            exit 1
          fi

      - name: Terraform Apply
        if: inputs.terraform_action == 'apply'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve

      - name: Terraform Destroy
        if: inputs.terraform_action == 'destroy' && inputs.destroy_confirmation == 'DESTROY'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform destroy -auto-approve
