
name: Terraform ECS Task Deploy

on:
  workflow_dispatch:
    inputs:
      terraform_action:
        description: "Choose action: apply, plan, or destroy"
        required: true
        type: choice
        default: apply
        options:
          - apply
          - plan
          - destroy
      destroy_confirmation:
        description: "Type DESTROY to confirm destroy"
        required: false
        type: string

permissions:
  contents: read

jobs:
  ecs-task-terraform:
    runs-on: ubuntu-latest

    env:
      TF_WORKING_DIR: terraform-ecs-fargate-fullstack-app/ecs-task

      # ✅ REGION FIX (clean + fallback)
      AWS_REGION: ${{ vars.AWS_REGION != '' && vars.AWS_REGION || secrets.AWS_REGION != '' && secrets.AWS_REGION || 'us-east-1' }}

      TF_STATE_BUCKET_VAR: ${{ vars.TF_STATE_BUCKET }}
      TF_STATE_BUCKET_SECRET: ${{ secrets.TF_STATE_BUCKET }}
      TF_LOCK_TABLE_VAR: ${{ vars.TF_LOCK_TABLE }}
      TF_LOCK_TABLE_SECRET: ${{ secrets.TF_LOCK_TABLE }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 🔧 Terraform setup
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7
          terraform_wrapper: false

      # 🔐 AWS credentials
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 📊 Debug info (très utile)
      - name: Show context
        run: |
          echo "AWS REGION: $AWS_REGION"
          echo "TF DIR: $TF_WORKING_DIR"

      # 🎯 Terraform INIT
      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          TF_STATE_BUCKET="${TF_STATE_BUCKET_VAR:-$TF_STATE_BUCKET_SECRET}"
          TF_LOCK_TABLE="${TF_LOCK_TABLE_VAR:-$TF_LOCK_TABLE_SECRET}"

          if [ -z "$TF_STATE_BUCKET" ]; then
            echo "Missing TF_STATE_BUCKET"
            exit 1
          fi

          if [ -z "$TF_LOCK_TABLE" ]; then
            echo "Missing TF_LOCK_TABLE"
            exit 1
          fi

          terraform init \
            -backend-config="bucket=$TF_STATE_BUCKET" \
            -backend-config="key=ecs-task/terraform.tfstate" \
            -backend-config="region=$AWS_REGION" \
            -backend-config="encrypt=true" \
            -backend-config="dynamodb_table=$TF_LOCK_TABLE"

      # ✅ Validate
      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      # 📦 Plan
      - name: Terraform Plan
        if: inputs.terraform_action == 'plan' || inputs.terraform_action == 'apply'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan

      # ⚠️ Destroy plan
      - name: Terraform Destroy Plan
        if: inputs.terraform_action == 'destroy'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -destroy

      # 🔥 Confirm destroy
      - name: Confirm Destroy
        if: inputs.terraform_action == 'destroy'
        run: |
          if [ "${{ inputs.destroy_confirmation }}" != "DESTROY" ]; then
            echo "Destroy not confirmed"
            exit 1
          fi

      # 🚀 Apply
      - name: Terraform Apply
        if: inputs.terraform_action == 'apply'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve

      # 💣 Destroy
      - name: Terraform Destroy
        if: inputs.terraform_action == 'destroy' && inputs.destroy_confirmation == 'DESTROY'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform destroy -auto-approve
